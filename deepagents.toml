# deepagents agent config — see https://github.com/langchain-ai/deepagents
# Read by `deepagents deploy` and by `create_deep_agent(...)` when launched
# from this repo root.

[agent]
name = "make-skills"
description = "Personal multi-skill orchestrator running inside VS Code, with platform-specific configs for Claude / Copilot / ChatGPT alongside cross-platform SKILL.md skills."
memory = ["./AGENTS.md"]
skills = [
    "./skills/",
    "./skills/_upstream/anthropics-skills/skills/",
]
subagents_dir = "./subagents/"

[model]
# Default model for the orchestrator. Subagents may override per-agent.
provider = "anthropic"
name = "claude-opus-4-7"

[sandbox]
# Filesystem backend rooted at the repo. Adjust if you want the agent
# scoped to a subdirectory or to use a different backend.
type = "filesystem"
root = "."

# ---------- MCP servers (commented; uncomment per-server to activate) ----------
# ToolUniverse — ~1000 scientific tools (PubMed, ArXiv, Semantic Scholar, ChEMBL, FDA, ...)
# unified behind one MCP. Compact Mode collapses them into ~5 discovery tools so the
# LLM doesn't see all 1000 at once. Mostly biomedical-flavored but the literature-search
# layer is domain-agnostic. https://github.com/mims-harvard/ToolUniverse
#
# Install: pip install tooluniverse  (or rely on uvx --refresh)
#
# [mcp.tooluniverse]
# command = "uvx"
# args = ["--refresh", "tooluniverse", "--mode", "compact"]
# env = { TOOLUNIVERSE_CACHE_DIR = "~/.cache/tooluniverse" }

# LlamaIndex docs — searches LlamaIndex / LlamaParse / LlamaCloud documentation.
# Useful so the agent can look up current API details when wiring document parsing.
# Already enabled for Claude Code via .mcp.json — uncomment here to also expose
# the same MCP to the deepagents runtime.
#
# [mcp.llama_index_docs]
# transport = "http"
# url = "https://developers.llamaindex.ai/mcp"

# Docker MCP — lets the agent inspect and manage containers (docker ps, logs,
# exec, compose). Powerful — scope cautiously. Use Docker's MCP Gateway which
# bundles container + filesystem + git + browser MCPs behind one server, or
# wire a bare docker MCP directly. https://github.com/docker/mcp-servers
#
# Concrete options:
#
# 1. Docker MCP Gateway (multi-server bundle — full toolbelt):
#
# [mcp.docker]
# command = "docker"
# args = ["mcp", "gateway", "run"]
#
# 2. Bare container management only (smaller blast radius, recommended start):
#
# [mcp.docker]
# command = "uvx"
# args = ["mcp-server-docker"]
# env = { DOCKER_HOST = "unix:///var/run/docker.sock" }
#
# Why off by default: an agent that can `docker exec` into its own postgres
# (or any other container) is a significant capability bump. Enable when you
# have a specific use case (e.g., letting the agent inspect its own logs or
# restart a stuck subagent worker), not preemptively.
