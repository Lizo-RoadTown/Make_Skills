# Render Blueprint — provisions the api web service + managed Postgres + persistent disk for LanceDB.
# Connect this repo via Render Dashboard → New → Blueprint and Render reads this file.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: make-skills-api
    runtime: docker
    dockerfilePath: ./platform/deploy/Dockerfile
    dockerContext: ./
    plan: starter            # $7/mo — required for persistent disks
    region: oregon           # change if you prefer another region
    healthCheckPath: /healthz
    autoDeploy: true         # deploy automatically on git push to main
    # Preview environments — every PR opened against main spins up a
    # disposable copy of this service with its own URL. Used for OAuth
    # round-trip testing without touching production. The preview shares
    # the production database (cheaper); enable per-DB preview generation
    # below if isolation is needed later.
    previews:
      generation: automatic
    envVars:
      # Secrets — set in Render dashboard, not in this file.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLAMA_CLOUD_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      # Pillar 1 model providers — all optional; lazy-loaded.
      # Set in Render dashboard for any provider you want to enable for subagents.
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: HUGGINGFACEHUB_API_TOKEN
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # BYO personal Ollama — point at your Docker Cloud / tunneled / VPS endpoint.
      # Leave unset to disable. Auth header is sent on every request when set.
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_AUTH_HEADER
        sync: false
      # Auto-wired from the managed Postgres below.
      - key: DATABASE_URL
        fromDatabase:
          name: make-skills-db
          property: connectionString
      # Pillar 0 — auth backend selector. Set to "hosted" to enable JWT
      # verification. Defaults here to self_host so the api boots cleanly
      # before the Next.js Auth.js app on Vercel is wired.
      - key: PLATFORM_MODE
        value: self_host
      # Auth.js shared secret (HS256). Required when PLATFORM_MODE=hosted.
      # Must match the AUTH_SECRET set on Vercel for the Next.js app.
      - key: AUTH_SECRET
        sync: false
      # Static config — these are baked-in paths (no volume mount on Render).
      - key: AGENT_CONFIG_PATH
        value: /app/deepagents.toml
      - key: AGENT_REPO_ROOT
        value: /app
      - key: MEMORY_DATA_DIR
        value: /data/memory
      - key: LANGSMITH_PROJECT
        value: make-skills
      - key: LANGSMITH_TRACING
        value: "false"
    disk:
      name: memory-data
      mountPath: /data/memory
      sizeGB: 1            # plenty for tens of thousands of records; expand later if needed

databases:
  - name: make-skills-db
    plan: free             # 256 MB / 1 GB storage / 30-day inactivity expiry
    databaseName: make_skills
    user: make_skills
    region: oregon         # match the web service region for low latency
